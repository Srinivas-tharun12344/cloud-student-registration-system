<!DOCTYPE html>
<html>
<head>
    <title>Student Registration System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 5px;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }

        ul {
            text-align: left;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Student Registration</h2>

    <input type="text" id="name" placeholder="Name"><br>
    <input type="email" id="email" placeholder="Email"><br>
    <input type="text" id="course" placeholder="Course"><br>

    <button onclick="register()">Register</button>
    <button onclick="getStudents()">View Students</button>

    <h3>Student List:</h3>
    <ul id="list"></ul>
</div>

<script>
const API = ""; // SAME SERVER

// CREATE
function register() {
    fetch(API + "/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            course: document.getElementById("course").value
        })
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
        getStudents();
    });
}

// READ
function getStudents() {
    fetch(API + "/students")
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(s => {
            list.innerHTML += `
                <li>
                    ${s.name} - ${s.email} - ${s.course}
                    <button onclick="deleteStudent('${s.email}')">Delete</button>
                </li>
            `;
        });
    });
}

// DELETE
function deleteStudent(email) {
    fetch(API + "/delete/" + email, {
        method: "DELETE"
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
        getStudents();
    });
}
</script>

</body>
</html>
